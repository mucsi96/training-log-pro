name: Pipeline

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test-server:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-test-server-${{ github.ref }}
      cancel-in-progress: true
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "21"
          cache: "maven"
      - run: mvn test -B -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=warn

  test-e2e:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-test-e2e-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: test/package-lock.json
      - name: Install dependencies
        working-directory: test
        run: npm ci
      - name: Install Playwright browsers
        working-directory: test
        run: npx playwright install chromium --with-deps
      - name: Setup test environment and start Docker Compose
        run: scripts/compose_up.sh
      - name: Run Playwright tests
        working-directory: test
        run: npx playwright test
      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results
          path: test/test-results
      - run: docker compose logs
        if: always()

  publish-server:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-publish-server-${{ github.ref }}
      cancel-in-progress: false
    needs:
      - test-server
      - test-e2e
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get next version
        id: get_next_version
        uses: mucsi96/get-next-version@main
        with:
          prefix: 'server'
          src: server

      - name: Login to Docker Hub
        if: steps.get_next_version.outputs.hasNextVersion == 'true'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push server image
        if: steps.get_next_version.outputs.hasNextVersion == 'true'
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/training-log-pro-server:${{ steps.get_next_version.outputs.version }} server
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/training-log-pro-server:${{ steps.get_next_version.outputs.version }}

      - name: Create release
        if: steps.get_next_version.outputs.hasNextVersion == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: server-${{ steps.get_next_version.outputs.version }}
          generate_release_notes: true

  publish-client:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-publish-client-${{ github.ref }}
      cancel-in-progress: false
    needs:
      - test-server
      - test-e2e
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get next version
        id: get_next_version
        uses: mucsi96/get-next-version@main
        with:
          prefix: 'client'
          src: client

      - name: Login to Docker Hub
        if: steps.get_next_version.outputs.hasNextVersion == 'true'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push client image
        if: steps.get_next_version.outputs.hasNextVersion == 'true'
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/training-log-pro-client:${{ steps.get_next_version.outputs.version }} client
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/training-log-pro-client:${{ steps.get_next_version.outputs.version }}

      - name: Create release
        if: steps.get_next_version.outputs.hasNextVersion == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: client-${{ steps.get_next_version.outputs.version }}
          generate_release_notes: true

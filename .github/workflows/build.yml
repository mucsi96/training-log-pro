name: Pipeline

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test-server:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-test-server-${{ github.ref }}
      cancel-in-progress: true
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: "21"
          cache: "maven"
      - run: mvn test -B -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=warn

  test-e2e:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-test-e2e-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: test/package-lock.json
      - name: Install dependencies
        working-directory: test
        run: npm ci
      - name: Install Playwright browsers
        working-directory: test
        run: npx playwright install chromium --with-deps
      - name: Setup test environment and start pod
        run: scripts/pod_up.sh
      - name: Run Playwright tests
        working-directory: test
        run: npx playwright test
      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results
          path: test/test-results
      - name: Collect pod logs
        if: always()
        run: |
          for container in $(podman pod inspect training-log-pro-test --format '{{range .Containers}}{{.Name}} {{end}}' 2>/dev/null); do
            echo "$container" | grep -q "infra" && continue
            echo "=== $container ==="
            podman logs "$container" 2>&1 || true
          done

  publish-server:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-publish-server-${{ github.ref }}
      cancel-in-progress: false
    needs:
      - test-server
      - test-e2e
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get next version
        id: get_next_version
        uses: mucsi96/get-next-version@main
        with:
          prefix: 'server'
          src: server

      - name: Login to Docker Hub
        if: steps.get_next_version.outputs.hasNextVersion == 'true'
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | podman login --username "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin docker.io

      - name: Build and push server image
        if: steps.get_next_version.outputs.hasNextVersion == 'true'
        run: |
          podman build -t docker.io/${{ secrets.DOCKERHUB_USERNAME }}/training-log-pro-server:${{ steps.get_next_version.outputs.version }} server
          podman push docker.io/${{ secrets.DOCKERHUB_USERNAME }}/training-log-pro-server:${{ steps.get_next_version.outputs.version }}

      - name: Create release
        if: steps.get_next_version.outputs.hasNextVersion == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: server-${{ steps.get_next_version.outputs.version }}
          generate_release_notes: true

  publish-client:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-publish-client-${{ github.ref }}
      cancel-in-progress: false
    needs:
      - test-server
      - test-e2e
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get next version
        id: get_next_version
        uses: mucsi96/get-next-version@main
        with:
          prefix: 'client'
          src: client

      - name: Login to Docker Hub
        if: steps.get_next_version.outputs.hasNextVersion == 'true'
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | podman login --username "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin docker.io

      - name: Build and push client image
        if: steps.get_next_version.outputs.hasNextVersion == 'true'
        run: |
          podman build -t docker.io/${{ secrets.DOCKERHUB_USERNAME }}/training-log-pro-client:${{ steps.get_next_version.outputs.version }} client
          podman push docker.io/${{ secrets.DOCKERHUB_USERNAME }}/training-log-pro-client:${{ steps.get_next_version.outputs.version }}

      - name: Create release
        if: steps.get_next_version.outputs.hasNextVersion == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: client-${{ steps.get_next_version.outputs.version }}
          generate_release_notes: true

  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-deploy
      cancel-in-progress: false
    needs: [publish-server, publish-client]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6

      - name: Connect to Twingate
        uses: twingate/github-action@v1
        with:
          service-key: ${{ secrets.TWINGATE_SERVICE_KEY }}

      - name: Deploy to Kubernetes
        env:
          K8S_CONFIG: ${{ secrets.K8S_CONFIG }}
          HOSTNAME: ${{ secrets.HOSTNAME }}
          API_CLIENT_ID: ${{ secrets.API_CLIENT_ID }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          AZURE_KEYVAULT_ENDPOINT: ${{ secrets.AZURE_KEYVAULT_ENDPOINT }}
        run: scripts/deploy.sh

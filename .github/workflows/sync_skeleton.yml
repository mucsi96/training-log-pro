name: Sync Skeleton App

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 2'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync-skeleton:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Get skeleton app changes from last week
        id: skeleton-diff
        run: |
          git clone --shallow-since="14 days ago" https://github.com/mucsi96/skeleton-app.git /tmp/skeleton-app
          cd /tmp/skeleton-app
          SINCE=$(date -d '14 days ago' --iso-8601)
          DIFF=$(git log --since="$SINCE" -p --no-merges)
          if [ -z "$DIFF" ]; then
            echo "No changes found in skeleton-app in the last week"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "$DIFF" > /tmp/skeleton-diff.patch
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Apply relevant changes with Claude
        if: steps.skeleton-diff.outputs.has_changes == 'true'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            You are synchronizing patterns and approaches from a skeleton-app into this repository.

            The file `/tmp/skeleton-diff.patch` contains the git log with diffs of all changes
            made to https://github.com/mucsi96/skeleton-app in the last week.

            Your task:
            1. Read `/tmp/skeleton-diff.patch` to understand what changed in the skeleton app
            2. Analyze each change and determine if it is relevant to this repository.
               Relevant changes include:
               - CI/CD pipeline patterns and improvements
               - Docker and Docker Compose configuration patterns
               - Build tooling and configuration updates
               - Testing infrastructure patterns
               - Code style and linting configuration
               - Deployment patterns and scripts
               - Dependency management approaches
               - General project structure improvements
            3. For each relevant change, adapt and apply it to this repository,
               accounting for the differences between the skeleton app and this project.
            4. Do NOT blindly copy files - adapt changes to fit this project's specific
               technologies (Spring Boot, Angular, PostgreSQL, etc.)
            5. Skip changes that are skeleton-app-specific and don't apply here.

            After making changes, create a pull request with:
            - A clear title describing what was synced
            - A body listing each change applied and why

            Use `gh pr create` to create the pull request against the main branch.

          claude_args: '--allowed-tools "Bash(gh pr create:*),Bash(gh pr view:*),Bash(git checkout:*),Bash(git add:*),Bash(git commit:*),Bash(git push:*),Bash(git branch:*),Bash(git diff:*),Bash(cat:*),Read,Edit,Write,Glob,Grep"'

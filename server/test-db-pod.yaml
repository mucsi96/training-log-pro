apiVersion: v1
kind: Pod
metadata:
  name: training-log-pro-test-db
spec:
  containers:
    - name: db
      image: docker.io/library/postgres:17.5-bullseye
      ports:
        - containerPort: 5432
          hostPort: 5435
      env:
        - name: POSTGRES_DB
          value: test
        - name: POSTGRES_PASSWORD
          value: postgres
        - name: POSTGRES_USER
          value: postgres
      livenessProbe:
        exec:
          command: ["pg_isready", "-U", "postgres"]
        initialDelaySeconds: 5
        periodSeconds: 10
        failureThreshold: 5

                    nullable: true
              - column:
                  name: name
                  type: varchar(255)
                  constraints:
                    nullable: true
              - column:
                  name: sport_type
                  type: varchar(255)
                  constraints:
                    nullable: true
              - column:
                  name: total_elevation_gain
                  type: float4
                  constraints:
                    nullable: true
              - column:
                  name: weighted_average_watts
                  type: float4
                  constraints:
                    nullable: true


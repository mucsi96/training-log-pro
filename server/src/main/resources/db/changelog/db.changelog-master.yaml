databaseChangeLog:
  - changeSet:
      id: 1-create-oauth2-authorized-client-table
      author: mucsi96
      changes:
        - createTable:
            tableName: oauth2_authorized_client
            columns:
              - column:
                  name: client_registration_id
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: principal_name
                  type: varchar(200)
                  constraints:
                    nullable: false
              - column:
                  name: access_token_type
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: access_token_value
                  type: bytea
                  constraints:
                    nullable: false
              - column:
                  name: access_token_issued_at
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: access_token_expires_at
                  type: timestamp
                  constraints:
                    nullable: false
              - column:
                  name: access_token_scopes
                  type: varchar(1000)
                  constraints:
                    nullable: true
              - column:
                  name: refresh_token_value
                  type: bytea
                  constraints:
                    nullable: true
              - column:
                  name: refresh_token_issued_at
                  type: timestamp
                  constraints:
                    nullable: true
              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - addPrimaryKey:
            tableName: oauth2_authorized_client
            columnNames: client_registration_id, principal_name


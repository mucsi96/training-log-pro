spring:
  datasource:
    url: ${db-url}
    username: ${db-username}
    password: ${db-password}
    driver-class-name: org.postgresql.Driver
  jpa:
    properties:
      hibernate:
        show-sql: true
        jdbc:
          time-zone: UTC
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
  cloud:
    azure:
      keyvault:
        secret:
          property-sources:
            - endpoint: ${AZURE_KEYVAULT_ENDPOINT}
              enabled: true
      active-directory:
        enabled: true
        profile:
          tenant-id: ${tenant-id}
        credential:
          client-id: ${api-client-id}
  security:
    oauth2:
      client:
        provider:
          withings:
            authorization-uri: ${WITHINGS_ACCOUNTS_URI}/oauth2_user/authorize2
            token-uri: ${WITHINGS_API_URI}/v2/oauth2
          strava:
            authorization-uri: ${STRAVA_API_URI}/oauth/authorize
            token-uri: ${STRAVA_API_URI}/oauth/token
        registration:
          withings-client:
            provider: withings
            client-id: ${WITHINGS_CLIENT_ID}
            client-secret: ${WITHINGS_CLIENT_SECRET}
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/withings/authorize"
            scope: user.metrics
          strava-client:
            provider: strava
            client-id: ${STRAVA_CLIENT_ID}
            client-secret: ${STRAVA_CLIENT_SECRET}
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/strava/authorize"
            scope: activity:read
server:
  servlet:
    context-path: /api
management:
  server:
    port: ${SPRING_ACTUATOR_PORT}
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
withings:
  api-uri: ${WITHINGS_API_URI}
strava:
  username: ${STRAVA_USERNAME}
  password: ${STRAVA_PASSWORD}
  api-uri: ${STRAVA_API_URI}

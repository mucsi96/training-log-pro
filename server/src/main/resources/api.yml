openapi: '3.0.2'
info:
  title: API
  version: '1.0'

servers:
  - url: http://localhost:8080

paths:

  /weight:
    get:
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  title: WeightMeasurement
                  type: object
                  required:
                    - date
                    - weight
                  properties:
                    date:
                      type: string
                      format: date-time
                    weight:
                      type: number
                      format: float
                    fatRatio:
                      type: number
                      format: float
                    fatMassWeight:
                      type: number
                      format: float

  /ride/stats:
    get:
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                title: RideStats
                type: object
                properties:
                  calories:
                    type: number
                    format: double
                  elevationGain:
                    type: number
                    format: double
                  distance:
                    type: number
                    format: double
                  time:
                    type: integer
                    format: int64

  /ride/podium:
    get:
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PodiumMessage'
        '204':
          description: No podium achievement today

  /pushups:
    get:
      parameters:
        - in: query
          name: period
          required: false
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PushupSet'
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - count
              properties:
                count:
                  type: integer
                  minimum: -500
                  maximum: 500
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PushupSet'

  /golden-day:
    get:
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                title: GoldenDayStats
                type: object
                required:
                  - monthCount
                  - currentStreak
                  - todayGolden
                  - todayPushups
                  - todayElevationGain
                  - todayReadingPages
                  - pushupGoal
                  - elevationGoal
                  - readingPagesGoal
                  - goldenDates
                properties:
                  monthCount:
                    type: integer
                    format: int32
                  currentStreak:
                    type: integer
                    format: int32
                  todayGolden:
                    type: boolean
                  todayPushups:
                    type: integer
                    format: int32
                  todayElevationGain:
                    type: number
                    format: double
                  todayReadingPages:
                    type: integer
                    format: int32
                  pushupGoal:
                    type: integer
                    format: int32
                  elevationGoal:
                    type: integer
                    format: int32
                  readingPagesGoal:
                    type: integer
                    format: int32
                  goldenDates:
                    type: array
                    items:
                      type: string
                      format: date

  /settings/golden-day-goal:
    get:
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GoldenDayGoal'
    put:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GoldenDayGoal'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GoldenDayGoal'

  /fitness:
    get:
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                title: FitnessTimeline
                type: object
                required:
                  - measurements
                properties:
                  measurements:
                    type: array
                    items:
                      title: FitnessMeasurement
                      type: object
                      required:
                        - date
                        - fitness
                        - fatigue
                        - form
                      properties:
                        date:
                          type: string
                          format: date-time
                        fitness:
                          type: number
                          format: float
                        fatigue:
                          type: number
                          format: float
                        form:
                          type: number
                          format: float

  /reading/books:
    get:
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Book'
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
                - author
                - totalPages
              properties:
                title:
                  type: string
                  minLength: 1
                  maxLength: 255
                author:
                  type: string
                  minLength: 1
                  maxLength: 255
                totalPages:
                  type: integer
                  minimum: 1
                  maximum: 100000
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Book'

  /reading/books/{id}/progress:
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
          format: uuid
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - currentPage
              properties:
                currentPage:
                  type: integer
                  minimum: 0
                  maximum: 100000
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Book'

  /reading/books/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
          format: uuid
    delete:
      responses:
        '204':
          description: No Content

  /reading/stats:
    get:
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                title: ReadingStats
                type: object
                required:
                  - todayPages
                  - dailyPagesGoal
                  - goalReached
                properties:
                  todayPages:
                    type: integer
                    format: int32
                  dailyPagesGoal:
                    type: integer
                    format: int32
                  goalReached:
                    type: boolean

components:
  schemas:
    PushupSet:
      type: object
      required:
        - createdAt
        - count
      properties:
        createdAt:
          type: string
          format: date-time
        count:
          type: integer
    GoldenDayGoal:
      type: object
      required:
        - pushupGoal
        - elevationGoal
        - readingPagesGoal
      properties:
        pushupGoal:
          type: integer
          format: int32
          minimum: 1
          maximum: 10000
        elevationGoal:
          type: integer
          format: int32
          minimum: 1
          maximum: 100000
        readingPagesGoal:
          type: integer
          format: int32
          minimum: 1
          maximum: 10000
    Book:
      type: object
      required:
        - id
        - title
        - author
        - totalPages
        - currentPage
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        author:
          type: string
        totalPages:
          type: integer
          format: int32
        currentPage:
          type: integer
          format: int32
        createdAt:
          type: string
          format: date-time
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
        averagePagesPerDay:
          type: number
          format: double
        estimatedDaysRemaining:
          type: integer
          format: int32
    PodiumMessage:
      type: object
      required:
        - segmentName
        - period
        - position
        - message
      properties:
        segmentName:
          type: string
        period:
          type: string
          enum:
            - WEEK
            - MONTH
            - ALL_TIME
        position:
          type: integer
          format: int32
          minimum: 1
          maximum: 3
        message:
          type: string

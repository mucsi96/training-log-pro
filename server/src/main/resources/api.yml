openapi: '3.0.2'
info:
  title: API
  version: '1.0'

servers:
  - url: http://localhost:8080

paths:

  /weight:
    get:
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  title: WeightMeasurement
                  type: object
                  required:
                    - date
                    - weight
                  properties:
                    date:
                      type: string
                      format: date-time
                    weight:
                      type: number
                      format: float
                    fatRatio:
                      type: number
                      format: float
                    fatMassWeight:
                      type: number
                      format: float

  /ride/stats:
    get:
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                title: RideStats
                type: object
                properties:
                  calories:
                    type: number
                    format: double
                  elevationGain:
                    type: number
                    format: double
                  distance:
                    type: number
                    format: double
                  time:
                    type: integer
                    format: int64

  /pushups:
    get:
      parameters:
        - in: query
          name: period
          required: false
          schema:
            type: integer
            minimum: 1
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PushupSet'
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - count
              properties:
                count:
                  type: integer
                  minimum: -500
                  maximum: 500
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PushupSet'

  /fitness:
    get:
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                title: FitnessTimeline
                type: object
                required:
                  - measurements
                properties:
                  pulledAt:
                    type: string
                    format: date-time
                  measurements:
                    type: array
                    items:
                      title: FitnessMeasurement
                      type: object
                      required:
                        - date
                        - fitness
                        - fatigue
                        - form
                      properties:
                        date:
                          type: string
                          format: date-time
                        fitness:
                          type: number
                          format: float
                        fatigue:
                          type: number
                          format: float
                        form:
                          type: number
                          format: float

components:
  schemas:
    PushupSet:
      type: object
      required:
        - createdAt
        - count
      properties:
        createdAt:
          type: string
          format: date-time
        count:
          type: integer

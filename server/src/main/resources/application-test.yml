spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.admin.SpringApplicationAdminJmxAutoConfiguration
  datasource:
    url: jdbc:postgresql://localhost:5435/test
    username: postgres
    password: postgres
  cloud:
    azure:
      keyvault:
        secret:
          property-sources:
            - enabled: false
  security:
    oauth2:
      client:
        provider:
          withings:
            authorization-uri: http://localhost:3001/withings/oauth2_user/authorize2
            token-uri: http://localhost:3001/withings/v2/oauth2
          strava:
            authorization-uri: http://localhost:3002/strava/oauth/authorize
            token-uri: http://localhost:3002/strava/oauth/token
        registration:
          withings-client:
            client-id: withings-client-id
            client-secret: withings-client-secret
          strava-client:
            client-id: strava-client-id
            client-secret: strava-client-secret
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080
withings:
  api-uri: http://localhost:3001/withings
strava:
  username: ""
  password: ""
  api-uri: http://localhost:3002/strava
management:
  server:
    port: ${server.port:0}

@let value = latest();
@let chart = chartOptions();
@if (todayFitness.isLoading() || periodFitness.isLoading()) {
<mat-spinner class="page-loading" />
} @else if (value && chart) {
<section>
  <div class="chart-wrapper">
    <div
      role="img"
      class="chart"
      echarts
      [options]="chart"
      [initOpts]="initOpts"
    ></div>
  </div>
  <article>
    <h2>Fitness</h2>
    <p class="value">{{ value.fitness | measurementWithUnit : "" : 0 }}</p>
  </article>
</section>
}

<mat-toolbar class="header">
  <nav>
    <a class="brand" mat-button routerLink="">Training Log Pro</a>
    @if (isAuthenticated() && isReady()) {
    <div class="nav-links">
      <a
        mat-button
        routerLink=""
        [routerLinkActiveOptions]="{ exact: true }"
        routerLinkActive
        ariaCurrentWhenActive="page"
        >Week</a
      >
      <a
        mat-button
        routerLink="month"
        routerLinkActive
        ariaCurrentWhenActive="page"
        >Month</a
      >
      <a
        mat-button
        routerLink="year"
        routerLinkActive
        ariaCurrentWhenActive="page"
        >Year</a
      >
      <a
        mat-button
        routerLink="all-time"
        routerLinkActive
        ariaCurrentWhenActive="page"
        >All time</a
      >
    </div>
    <button
      type="button"
      class="nav-toggle"
      mat-button
      [matMenuTriggerFor]="navMenu"
      aria-label="Open navigation"
    >
      <span class="nav-toggle-icon" aria-hidden="true">
        <span></span>
        <span></span>
        <span></span>
      </span>
    </button>
    <mat-menu #navMenu="matMenu">
      <a
        mat-menu-item
        routerLink=""
        [routerLinkActiveOptions]="{ exact: true }"
        routerLinkActive
        ariaCurrentWhenActive="page"
        >Week</a
      >
      <a
        mat-menu-item
        routerLink="month"
        routerLinkActive
        ariaCurrentWhenActive="page"
        >Month</a
      >
      <a
        mat-menu-item
        routerLink="year"
        routerLinkActive
        ariaCurrentWhenActive="page"
        >Year</a
      >
      <a
        mat-menu-item
        routerLink="all-time"
        routerLinkActive
        ariaCurrentWhenActive="page"
        >All time</a
      >
    </mat-menu>
    <div class="header-right">
      <app-header></app-header>
    </div>
    }
  </nav>
</mat-toolbar>

<main>
  @if (isAuthenticated() && !isReady()) {
  <mat-spinner class="page-loading" />
  } @else {
  <router-outlet></router-outlet>
  }
</main>
